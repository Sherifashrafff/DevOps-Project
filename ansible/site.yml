---
# Kubernetes Cluster Setup - Amazon Linux 2 Compatible
# This playbook sets up a Kubernetes cluster on Amazon Linux 2 instances
# For detailed migration information, see AMAZON_LINUX_2_MIGRATION.md

- name: Prepare all nodes
  hosts: all
  become: yes
  roles:
    - prerequisites
    - containerd
    - kubernetes_base

- name: Setup Kubernetes control plane
  hosts: control_node
  become: yes
  roles:
    - controlplane

- name: Join worker nodes
  hosts: worker_nodes
  become: yes
  roles:
    - worker
