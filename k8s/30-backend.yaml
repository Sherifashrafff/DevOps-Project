apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: taskflow
  labels:
    app: backend
    app.kubernetes.io/part-of: taskflow
data:
  NODE_ENV: "production"
  PORT: "3000"
  DB_HOST: "postgres.taskflow.svc.cluster.local"
  DB_PORT: "5432"
  DB_SSL: "false"
  JWT_EXPIRES_IN: "7d"
  CORS_ORIGINS: "http://localhost:8080"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: taskflow
  labels:
    app: backend
    app.kubernetes.io/part-of: taskflow
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taskflow
  labels:
    app: backend
    app.kubernetes.io/part-of: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: migrate
          image: 390449413955.dkr.ecr.us-east-1.amazonaws.com/taskflow-backend:4
          command: ["npm", "run", "migrate"]
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: backend
          image: 390449413955.dkr.ecr.us-east-1.amazonaws.com/taskflow-backend:latest
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: taskflow-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
